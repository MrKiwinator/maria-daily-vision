<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="80" y1="60" x2="430" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD6D6"></stop>
      <stop offset="0.5" stop-color="#FFC4B8"></stop>
      <stop offset="1" stop-color="#F7B7D2"></stop>
    </linearGradient>

    <linearGradient id="textGradient" x1="180" y1="170" x2="340" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A94F7A"></stop>
      <stop offset="1" stop-color="#7B3F63"></stop>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#D88AA7" flood-opacity="0.35"></feDropShadow>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="220" fill="url(#bgGradient)" filter="url(#shadow)"></circle>

  <!-- Decorative soft ring -->
  <circle cx="256" cy="256" r="198" stroke="rgba(255,255,255,0.45)" stroke-width="3" fill="none"></circle>

  <!-- Decorative spark -->
  <path d="M390 145L396 160L411 166L396 172L390 187L384 172L369 166L384 160L390 145Z" fill="#FFF3F6" opacity="0.9"></path>

  <!-- Main text -->
  <text x="256" y="285" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="110" font-weight="700" letter-spacing="6" fill="url(#textGradient)">
    MDV
  </text>

  <!-- Subtitle -->
  <text x="256" y="345" text-anchor="middle" font-family="'Trebuchet MS', sans-serif" font-size="24" letter-spacing="4" fill="#8A5C6F" opacity="0.85">
    Maria Daily Vision
  </text>
</svg>