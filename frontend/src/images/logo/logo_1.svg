<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#fffefd"/>
      <stop offset="100%" stop-color="#f7eef1"/>
    </radialGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5dfc8"/>
      <stop offset="100%" stop-color="#e7c9a8"/>
    </linearGradient>

    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffb7c7"/>
      <stop offset="100%" stop-color="#ea8fa2"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#e9d5dc" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Main background -->
  <circle cx="512" cy="512" r="460" fill="url(#bg)"/>

  <!-- Floral wreath -->
  <g opacity="0.9">
    <path d="M250 300 C180 420 180 610 270 740" fill="none" stroke="#ead8de" stroke-width="8" stroke-linecap="round"/>
    <path d="M770 300 C840 420 840 610 750 740" fill="none" stroke="#ead8de" stroke-width="8" stroke-linecap="round"/>

    <!-- Left leaves -->
    <ellipse cx="235" cy="360" rx="22" ry="55" transform="rotate(-35 235 360)" fill="#ead7e3"/>
    <ellipse cx="215" cy="440" rx="20" ry="48" transform="rotate(-45 215 440)" fill="#f2dfe5"/>
    <ellipse cx="210" cy="525" rx="22" ry="55" transform="rotate(-50 210 525)" fill="#e7d2de"/>
    <ellipse cx="225" cy="610" rx="20" ry="48" transform="rotate(-35 225 610)" fill="#f4dfe7"/>

    <!-- Right leaves -->
    <ellipse cx="790" cy="360" rx="22" ry="55" transform="rotate(35 790 360)" fill="#ead7e3"/>
    <ellipse cx="810" cy="440" rx="20" ry="48" transform="rotate(45 810 440)" fill="#f2dfe5"/>
    <ellipse cx="815" cy="525" rx="22" ry="55" transform="rotate(50 815 525)" fill="#e7d2de"/>
    <ellipse cx="800" cy="610" rx="20" ry="48" transform="rotate(35 800 610)" fill="#f4dfe7"/>
  </g>

  <!-- Top flowers -->
  <g filter="url(#shadow)">
    <g transform="translate(290 250)">
      <circle r="44" fill="#fff8f8"/>
      <circle r="12" fill="#efb0b9"/>
    </g>

    <g transform="translate(735 250)">
      <circle r="44" fill="#fff8f8"/>
      <circle r="12" fill="#efb0b9"/>
    </g>

    <!-- Bottom roses -->
    <g transform="translate(330 760)">
      <circle r="50" fill="#fff5f6"/>
      <circle r="35" fill="#ffdbe2"/>
      <circle r="18" fill="#efb7c2"/>
    </g>

    <g transform="translate(700 760)">
      <circle r="50" fill="#fff5f6"/>
      <circle r="35" fill="#ffdbe2"/>
      <circle r="18" fill="#efb7c2"/>
    </g>
  </g>

  <!-- MDV text -->
  <g filter="url(#shadow)">
    <text x="500" y="560"
          text-anchor="middle"
          font-family="Cormorant Garamond, Times New Roman, serif"
          font-size="170"
          letter-spacing="4"
          fill="#4b4652">
      MD
    </text>

    <text x="685" y="560"
          font-family="Cormorant Garamond, Times New Roman, serif"
          font-size="170"
          letter-spacing="4"
          fill="url(#pink)">
      V
    </text>
  </g>
</svg>